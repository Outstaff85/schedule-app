[[redirects]]
  from = "/"
  to = "/schedule-manager.html"
  status = 302

[[redirects]]
  from = "/punch"
  to = "/worker-punch.html"
  status = 200

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/worker-punch.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/schedule-manager.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/**/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/**/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
